<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 소시오메트리 갤러리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        .hidden { display: none; }
        #login-section { text-align: center; padding: 50px 0; }
        input[type="text"] { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; margin-right: 5px; }
        button { padding: 10px 15px; border: none; background-color: #4CAF50; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .upload-area { text-align: center; margin-bottom: 30px; padding: 20px; background: #eef2f3; border-radius: 8px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; width: 210px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; background: #eee; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .like-btn { background-color: #ff4757; color: white; border: none; padding: 8px; flex: 1; border-radius: 5px; }
        .unlike-btn { background-color: #a4b0be; color: white; border: none; padding: 8px; flex: 1; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: center; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f1f2f6; }
        .highlight { background-color: #ffeaa7; font-weight: bold; }
        .self-cell { background-color: #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>👋 실시간 다중 갤러리</h1>
        <input type="text" id="nickname-input" placeholder="닉네임 입력">
        <button id="login-btn">입장하기</button>
    </div>

    <div id="app-section" class="hidden">
        <h1 id="welcome-msg"></h1>
        <div class="upload-area">
            <input type="file" id="image-file" accept="image/*">
            <button id="upload-btn">사진 등록</button>
            <button id="delete-btn">삭제</button>
        </div>
        <h2>🎨 친구들의 작품</h2>
        <div class="gallery" id="gallery-container"></div>
        <h2>📊 소시오메트리 (행:받은사람, 열:보낸사람)</h2>
        <div id="matrix-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, collection, increment, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBMUuFpTgLzGtl4ILPBZIV5jpJDJzod1zI",
  authDomain: "pagerank2-ef00f.firebaseapp.com",
  projectId: "pagerank2-ef00f",
  storageBucket: "pagerank2-ef00f.firebasestorage.app",
  messagingSenderId: "235378063628",
  appId: "1:235378063628:web:02980c1335f0a9d9903129",
  measurementId: "G-045RQXJ0FT"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    let currentUser = null;
    let localAppData = {};

    async function login() {
        const name = document.getElementById('nickname-input').value.trim();
        if (!name) return;
        currentUser = name;
        const ref = doc(db, "students", currentUser);
        if (!(await getDoc(ref)).exists()) await setDoc(ref, { nickname: currentUser, image: "", likes: {} });
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `🙋‍♂️ ${currentUser}님 환영합니다!`;
        onSnapshot(collection(db, "students"), snap => {
            localAppData = {};
            snap.forEach(d => localAppData[d.id] = d.data());
            updateUI();
        });
    }

    // 행/열 전환된 표 렌더링
    function renderMatrix() {
        const container = document.getElementById('matrix-container');
        const users = Object.keys(localAppData).sort();
        let html = "<table><tr><th>받은 사람 \\ 보낸 사람</th>";
        users.forEach(u => html += `<th>${u}</th>`);
        html += "<th>받은 합계</th></tr>";
        
        users.forEach(receiver => {
            html += `<tr><th>${receiver}</th>`;
            let receiveCount = 0;
            users.forEach(sender => {
                if (sender === receiver) html += `<td class="self-cell">-</td>`;
                else {
                    const count = (localAppData[receiver].likes || {})[sender] || 0;
                    receiveCount += count;
                    html += `<td class="${count > 0 ? 'highlight' : ''}">${count}</td>`;
                }
            });
            html += `<td><strong>${receiveCount}</strong></td></tr>`;
        });
        container.innerHTML = html;
    }

    function updateUI() {
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        for (const [user, data] of Object.entries(localAppData)) {
            if (!data.image) continue;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${data.image}"><h3>${user}</h3><div class='btn-group'><button class='like-btn' id='l-${user}'>❤️</button><button class='unlike-btn' id='u-${user}'>💔</button></div>`;
            cont.appendChild(card);
            document.getElementById(`l-${user}`).onclick = () => updateDoc(doc(db, "students", user), { [`likes.${currentUser}`]: increment(1) });
            document.getElementById(`u-${user}`).onclick = () => updateDoc(doc(db, "students", user), { [`likes.${currentUser}`]: increment(-1) });
        }
        renderMatrix();
    }

    document.getElementById('login-btn').onclick = login;
    document.getElementById('upload-btn').onclick = () => {
        const file = document.getElementById('image-file').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => updateDoc(doc(db, "students", currentUser), { image: e.target.result });
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
